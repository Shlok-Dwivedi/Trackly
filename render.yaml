services:
  - type: web
    name: trackly-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FRONTEND_ORIGIN
        sync: false
      - key: VERCEL_FRONTEND_ORIGIN
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: GOOGLE_CALENDAR_ID
        sync: false
      - key: DEFAULT_TIMEZONE
        value: Asia/Kolkata
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
